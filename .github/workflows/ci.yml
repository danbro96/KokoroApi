name: ci

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/KokoroApi/KokoroApi.csproj
      - run: dotnet build src/KokoroApi/KokoroApi.csproj --no-restore -c Release
