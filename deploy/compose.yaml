services:
  kokoro-api:
    image: danbro96/kokoro-api:${IMAGE_TAG:-latest}
    container_name: kokoro-api
    environment:
      Auth__ApiKeys__0__Key: ${KOKORO_API_KEY:?required}
      Auth__ApiKeys__0__Name: ${KOKORO_API_KEY_NAME:-prod}
      Auth__AllowedOrigins__0: ${ALLOWED_ORIGIN:-}
      RateLimit__RequestsPerMinute: ${RATE_LIMIT:-60}
      Kokoro__DefaultVoice: ${DEFAULT_VOICE:-af_heart}
      Kokoro__MaxTextLength: ${MAX_TEXT_LENGTH:-4000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod,host.name=medelynas}
    ports:
      - "${HOST_PORT:-40280}:8080"
    volumes:
      - /mnt/tank2/appdata/kokoro_api:/app/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - default
      - medelynas_telemetry

networks:
  default:
    driver: bridge
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
